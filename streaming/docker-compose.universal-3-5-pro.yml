# Standalone self-hosted streaming stack using the Universal-3.5 Pro ASR backend.
#
# Serves the Universal-3.5 Pro model (STREAMING_ASR_UNIVERSAL_3_5_PRO_IMAGE).
# Websocket clients select it with speech_model "universal-3-5-pro", which the
# load balancer routes (X-Model-Version: universal-3-5-pro) to the
# streaming-asr-universal-3-5-pro backend.
# Run one streaming stack at a time: each stack binds the same host ports
# (8080/8081/50051/8082), so they cannot run side by side.
#
# Usage:
#   docker compose -f docker-compose.universal-3-5-pro.yml up -d

services:
  streaming-api:
    image: ${STREAMING_API_IMAGE}
    ports:
      - "8080:8080"
    environment:
      - AAI_WSS_PORT=8080
      - AAI_LOG_LEVEL=INFO
      - AAI_USE_STRUCTURED_LOGGING=False
      - AAI_ASR_ENDPOINT=streaming-asr-lb:80
      - AAI_USE_SECURE_CHANNEL_TO_ASR_SERVICE=False
      - AAI_LICENSE_AND_USAGE_PROXY_ENDPOINT=http://license-and-usage-proxy:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v3/ws/health"]
      interval: 10s
      timeout: 2s
      retries: 2
      start_period: 5s
    depends_on:
      - streaming-asr-lb
      - license-and-usage-proxy
    networks:
      - streaming-network

  streaming-asr-lb:
    image: nginx:alpine
    ports:
      - "8081:80"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:80/nginx_health" ]
      interval: 10s
      timeout: 2s
      retries: 2
      start_period: 10s
    volumes:
      - ./nginx_streaming_asr.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streaming-asr-universal-3-5-pro
    networks:
      - streaming-network

  streaming-asr-universal-3-5-pro:
    image: ${STREAMING_ASR_UNIVERSAL_3_5_PRO_IMAGE}
    ports:
      - "50051:50051"
    environment:
      - SERVER_PORT=50051
      - LOGGING_LEVEL=INFO
      - USE_STRUCTURED_LOGGING=False
      - MAX_OPEN_STREAMS=32
      # Required on newer GPUs (e.g. Blackwell): the FlashInfer sampler would
      # otherwise JIT-compile a kernel at startup and needs nvcc (absent from the
      # image), crashing the engine. Disabling it is safe on supported GPUs too.
      - VLLM_USE_FLASHINFER_SAMPLER=0
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 300s
    networks:
      - streaming-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ "gpu" ]

  license-and-usage-proxy:
    image: ${LICENSE_AND_USAGE_PROXY_IMAGE}
    ports:
      - "8082:8080"
    environment:
      - HTTP_PORT=8080
      - LOGGING_LEVEL=INFO
      - USE_STRUCTURED_LOGGING=False
      - LICENSE_FILE_PATH=/var/aai_license.jwt
      - USAGE_TRACKING_API_KEY=${USAGE_TRACKING_API_KEY} # Set if license is for usage-based billing
    volumes:
      - ./license.jwt:/var/aai_license.jwt:ro
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 2s
      retries: 2
      start_period: 10s
    networks:
      - streaming-network

networks:
  streaming-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
