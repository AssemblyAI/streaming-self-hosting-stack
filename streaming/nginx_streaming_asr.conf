events { worker_connections 1024; }

http {
  access_log /dev/stdout;
  error_log  /dev/stderr info;

  # Resolve ASR service hostnames lazily via Docker's embedded DNS so this
  # config works for any stack without crashing on backends that aren't
  # deployed in the current stack.
  resolver 127.0.0.11 valid=30s;

  map $http_x_model_version $asr_backend {
    default    streaming-asr-english:50051;
    en-default streaming-asr-english:50051;
    ml-default streaming-asr-multilang:50051;
    universal-3-5-pro streaming-asr-universal-3-5-pro:50051;
  }

  keepalive_timeout     10h;
  client_header_timeout 10h;
  send_timeout          10h;

  server {
    listen 80;
    http2 on;
    client_max_body_size 0;

    # ---- Health endpoint (NGINX itself) ----
    location = /nginx_health {
      access_log off;
      default_type text/plain;
      return 200 "OK\n";
    }

    location / {
      grpc_pass grpc://$asr_backend;
      grpc_connect_timeout 75s;
      grpc_read_timeout    10h;
      grpc_send_timeout    10h;
      grpc_socket_keepalive on;
    }
  }
}
